worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream authelia_backend {
        server authelia:9091;
    }

    upstream hyperfocus {
        server backend:8080;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACP_NGINX_LOCAL_HEALTHCHECK_V2
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok
";
        }

        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name rosetta.chat;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Authelia subrequest
        location = /authelia-auth {
            internal;
            proxy_pass http://authelia_backend/api/authz/auth-request;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-URI $request_uri;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Authelia portal
        location /authelia {
            proxy_pass http://authelia_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health (no auth)
        location = /health {
            auth_request off;
            proxy_pass http://hyperfocus;
        }

        # API (protected)
        location /api/ {
            auth_request off;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_pass http://hyperfocus;
        }

        # Frontend (protected)
        location / {
            auth_request /authelia-auth;
            error_page 401 =302 https://$host/authelia/?rd=$scheme://$host$request_uri;

            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
